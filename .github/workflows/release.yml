name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          # macOS doesn't support ARM64 officially in this build
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'

      - name: Build API binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          OUTPUT_NAME=api
          [[ "$GOOS" == "windows" ]] && OUTPUT_NAME=api.exe
          go build -v -o dist/${OUTPUT_NAME} ./cmd/api

      - name: Build Worker binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          OUTPUT_NAME=worker
          [[ "$GOOS" == "windows" ]] && OUTPUT_NAME=worker.exe
          go build -v -o dist/${OUTPUT_NAME} ./cmd/worker

      - name: Package binaries
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          OS_ARCH=${{ matrix.goos }}-${{ matrix.goarch }}
          ARCHIVE_NAME=workflow-engine-${TAG_NAME}-${OS_ARCH}
          
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            zip -r dist/${ARCHIVE_NAME}.zip dist/api.exe dist/worker.exe
            rm dist/api.exe dist/worker.exe
          else
            tar -czf dist/${ARCHIVE_NAME}.tar.gz -C dist api worker
            rm dist/api dist/worker
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  create-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          # Collect all artifacts
          FILES=""
          for dir in artifacts/*/; do
            for file in "$dir"*; do
              if [ -f "$file" ]; then
                FILES="$FILES $file"
              fi
            done
          done
          
          gh release create "$TAG_NAME" $FILES \
            --title "Release $TAG_NAME" \
            --generate-notes

  push-docker-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [api, worker]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
